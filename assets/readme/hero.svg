<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c10"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Grid overlay -->
  <path d="M 0 40 L 1200 40 M 0 80 L 1200 80 M 0 120 L 1200 120 M 0 160 L 1200 160 M 0 200 L 1200 200 M 0 240 L 1200 240 M 0 280 L 1200 280 M 0 320 L 1200 320 M 0 360 L 1200 360 M 0 400 L 1200 400 M 0 440 L 1200 440" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
  <path d="M 80 0 L 80 480 M 160 0 L 160 480 M 240 0 L 240 480 M 320 0 L 320 480 M 400 0 L 400 480 M 480 0 L 480 480 M 560 0 L 560 480 M 640 0 L 640 480 M 720 0 L 720 480 M 800 0 L 800 480 M 880 0 L 880 480 M 960 0 L 960 480 M 1040 0 L 1040 480 M 1120 0 L 1120 480" stroke="#1e293b" stroke-width="1" opacity="0.3"/>

  <!-- Left Side: Typography -->
  <g transform="translate(100, 150)">
    <!-- Logo Badge -->
    <rect width="100" height="28" rx="14" fill="#0e1b2e" stroke="#0891b2" stroke-width="1.5"/>
    <text x="50" y="18" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">LOCAL-FIRST</text>
    
    <!-- Title -->
    <text x="0" y="90" fill="url(#primary-grad)" font-family="system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">besynx</text>
    
    <!-- Subtitle -->
    <text x="0" y="130" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="20" font-weight="400">Bitwarden for Browser History &amp; Cookies</text>
    
    <!-- Badges / Description tags -->
    <g transform="translate(0, 160)">
      <!-- Tag 1 -->
      <rect x="0" y="0" width="130" height="30" rx="6" fill="#1e293b" opacity="0.8"/>
      <text x="65" y="19" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">🔒 Peer-to-Peer</text>

      <!-- Tag 2 -->
      <rect x="145" y="0" width="125" height="30" rx="6" fill="#1e293b" opacity="0.8"/>
      <text x="207.5" y="19" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">⚡ Zero Cloud</text>

      <!-- Tag 3 -->
      <rect x="285" y="0" width="140" height="30" rx="6" fill="#1e293b" opacity="0.8"/>
      <text x="355" y="19" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">🛡️ Mutual Ed25519</text>
    </g>
  </g>

  <!-- Right Side: Visualization / Network Graphic -->
  <g transform="translate(850, 240)">
    <!-- Glow behind Daemon -->
    <circle cx="0" cy="0" r="100" fill="url(#glow-grad)" filter="url(#glow)"/>
    
    <!-- Connection lines -->
    <!-- Line 1 to Chrome -->
    <path d="M 0 0 L -120 -100" stroke="#334155" stroke-dasharray="4 4" stroke-width="2"/>
    <path d="M 0 0 L -120 -100" stroke="#22d3ee" stroke-width="2" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="2s" repeatCount="indefinite" />
    </path>

    <!-- Line 2 to Firefox -->
    <path d="M 0 0 L -160 0" stroke="#334155" stroke-dasharray="4 4" stroke-width="2"/>
    <path d="M 0 0 L -160 0" stroke="#3b82f6" stroke-width="2" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="2.5s" repeatCount="indefinite" />
    </path>

    <!-- Line 3 to Brave -->
    <path d="M 0 0 L -120 100" stroke="#334155" stroke-dasharray="4 4" stroke-width="2"/>
    <path d="M 0 0 L -120 100" stroke="#22d3ee" stroke-width="2" opacity="0.8">
      <animate attributeName="stroke-dashoffset" values="30;0" dur="1.8s" repeatCount="indefinite" />
    </path>

    <!-- Central Daemon Node -->
    <circle cx="0" cy="0" r="48" fill="#0f172a" stroke="#0891b2" stroke-width="3" filter="url(#glow)"/>
    <!-- Lock Icon in Central Daemon -->
    <path d="M -10 -2 L -10 -10 C -10 -15 -5 -18 0 -18 C 5 -18 10 -15 10 -10 L 10 -2" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    <rect x="-14" y="-2" width="28" height="22" rx="4" fill="#22d3ee"/>
    <circle cx="0" cy="8" r="3" fill="#0f172a"/>

    <!-- Peripheral Node 1: Chrome (Top Left) -->
    <g transform="translate(-120, -100)">
      <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <!-- Chrome Symbol simplified -->
      <circle cx="0" cy="0" r="10" fill="#3b82f6"/>
      <path d="M 0 -20 L 0 -10 M -17 10 L -8 5 M 17 10 L 8 5" stroke="#94a3b8" stroke-width="2"/>
      <text x="0" y="38" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Chrome Extension</text>
    </g>

    <!-- Peripheral Node 2: Firefox (Center Left) -->
    <g transform="translate(-160, 0)">
      <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="#ea580c" stroke-width="2"/>
      <!-- Firefox Symbol simplified -->
      <circle cx="0" cy="0" r="8" fill="#ea580c"/>
      <path d="M -12 -12 C -6 -20 6 -20 12 -12 C 18 -4 10 12 0 12" fill="none" stroke="#f97316" stroke-width="2"/>
      <text x="0" y="38" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Firefox Extension</text>
    </g>

    <!-- Peripheral Node 3: Brave / Local Peer (Bottom Left) -->
    <g transform="translate(-120, 100)">
      <circle cx="0" cy="0" r="28" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
      <!-- Brave Lion simplified / Peer node -->
      <path d="M -8 -8 L 0 -16 L 8 -8 L 12 8 L 0 14 L -12 8 Z" fill="none" stroke="#22d3ee" stroke-width="2"/>
      <text x="0" y="38" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Brave Extension</text>
    </g>
    
    <!-- Central Node Label -->
    <text x="0" y="65" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">besynx daemon</text>
  </g>
</svg>
